<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MPL Route Calculator</title>

<style>
body{
font-family:Arial,Helvetica,sans-serif;
margin:0;
background:#f4f4f4;
padding:10px;
}

h2{
margin-top:25px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,select,textarea,button{
width:100%;
padding:8px;
margin:5px 0;
border-radius:6px;
border:1px solid #ccc;
box-sizing:border-box;
}

button{
background:#2c7be5;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#1a5fd0;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

table th,table td{
border:1px solid #ddd;
padding:6px;
font-size:14px;
}

.row{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.row > div{
flex:1;
min-width:120px;
}

.result{
background:#f0f8ff;
padding:10px;
border-radius:6px;
margin-top:10px;
}

@media(max-width:600px){
table th,table td{
font-size:12px;
}
}
</style>
</head>

<body>

<div class="container">

<h1>MPL Route Calculator</h1>

<h2>Pengaturan User</h2>
<input id="userNation" placeholder="Kewarganegaraan User">

<h2>Import Kota Massal</h2>
<textarea id="bulkCities" rows="4" placeholder="Format: Kota,Negara"></textarea>
<button onclick="importCities()">Import Kota</button>

<h2>Tambah Kota</h2>
<div class="row">
<div><input id="cityName" placeholder="Nama Kota"></div>
<div><input id="cityCountry" placeholder="Negara"></div>
</div>
<button onclick="addCity()">Tambah Kota</button>

<h2>Daftar Kota</h2>
<table id="cityTable">
<thead>
<tr>
<th>Kota</th>
<th>Negara</th>
<th>Aksi</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h2>Tambah / Edit Jarak</h2>

<div class="row">
<div>
<select id="cityA"></select>
</div>

<div>
<select id="cityB"></select>
</div>

<div>
<input id="distanceKM" type="number" placeholder="KM">
</div>
</div>

<button onclick="addDistance()">Simpan Jarak</button>

<h2>Daftar Jarak</h2>
<table id="distanceTable">
<thead>
<tr>
<th>Kota A</th>
<th>Kota B</th>
<th>KM</th>
<th>Aksi</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h2>Cari Rute</h2>

<div class="row">
<div>
<select id="startCity"></select>
</div>

<div>
<select id="targetCity"></select>
</div>
</div>

<button onclick="findRoute()">Cari Rute</button>

<div class="result" id="routeResult"></div>

</div>

<script>

let cities = JSON.parse(localStorage.getItem("cities") || "[]")
let distances = JSON.parse(localStorage.getItem("distances") || "[]")

function save(){
localStorage.setItem("cities",JSON.stringify(cities))
localStorage.setItem("distances",JSON.stringify(distances))
}

function refreshCitySelects(){

let selects=["cityA","cityB","startCity","targetCity"]

selects.forEach(id=>{
let s=document.getElementById(id)
s.innerHTML=""

cities.forEach((c,i)=>{
let o=document.createElement("option")
o.value=i
o.textContent=c.name+" ("+c.country+")"
s.appendChild(o)
})

})

}

function renderCities(){

let tbody=document.querySelector("#cityTable tbody")
tbody.innerHTML=""

cities.forEach((c,i)=>{

let tr=document.createElement("tr")

tr.innerHTML=
"<td>"+c.name+"</td>"+
"<td><input value='"+c.country+"' onchange='editCountry("+i+",this.value)'></td>"+
"<td><button onclick='deleteCity("+i+")'>Hapus</button></td>"

tbody.appendChild(tr)

})

refreshCitySelects()
save()

}

function addCity(){

let name=document.getElementById("cityName").value.trim()
let country=document.getElementById("cityCountry").value.trim()

if(!name || !country) return

cities.push({name,country})

document.getElementById("cityName").value=""
document.getElementById("cityCountry").value=""

renderCities()

}

function editCountry(i,val){

cities[i].country=val
save()
refreshCitySelects()

}

function deleteCity(i){

cities.splice(i,1)
renderCities()

}

function importCities(){

let text=document.getElementById("bulkCities").value.trim()

if(!text) return

text.split("\n").forEach(line=>{

let p=line.split(",")

if(p.length>=2){

cities.push({
name:p[0].trim(),
country:p[1].trim()
})

}

})

document.getElementById("bulkCities").value=""

renderCities()

}

function renderDistances(){

let tbody=document.querySelector("#distanceTable tbody")
tbody.innerHTML=""

distances.forEach((d,i)=>{

let tr=document.createElement("tr")

tr.innerHTML=
"<td>"+cities[d.a].name+"</td>"+
"<td>"+cities[d.b].name+"</td>"+
"<td>"+d.km+"</td>"+
"<td><button onclick='deleteDistance("+i+")'>Hapus</button></td>"

tbody.appendChild(tr)

})

save()

}

function addDistance(){

let a=parseInt(document.getElementById("cityA").value)
let b=parseInt(document.getElementById("cityB").value)
let km=parseFloat(document.getElementById("distanceKM").value)

if(isNaN(a)||isNaN(b)||isNaN(km)) return

distances.push({a,b,km})

document.getElementById("distanceKM").value=""

renderDistances()

}

function deleteDistance(i){

distances.splice(i,1)
renderDistances()

}

function getNeighbors(cityIndex,userNation){

let result=[]

distances.forEach(d=>{

if(d.a===cityIndex){

let target=d.b
let type="travel"
let weight=d.km

if(
cities[cityIndex].country===userNation &&
cities[target].country===userNation
){
type="angkot"
weight=0.5
}

result.push({to:target,weight,type})

}

if(d.b===cityIndex){

let target=d.a
let type="travel"
let weight=d.km

if(
cities[cityIndex].country===userNation &&
cities[target].country===userNation
){
type="angkot"
weight=0.5
}

result.push({to:target,weight,type})

}

})

return result

}

function findRoute(){

let start=parseInt(document.getElementById("startCity").value)
let target=parseInt(document.getElementById("targetCity").value)
let userNation=document.getElementById("userNation").value.trim()

let dist=[]
let prev=[]
let prevType=[]

cities.forEach((_,i)=>{
dist[i]=Infinity
prev[i]=null
})

dist[start]=0

let visited=[]

while(true){

let u=-1
let best=Infinity

dist.forEach((d,i)=>{
if(!visited[i] && d<best){
best=d
u=i
}
})

if(u===-1) break
if(u===target) break

visited[u]=true

let neighbors=getNeighbors(u,userNation)

neighbors.forEach(n=>{

let alt=dist[u]+n.weight

if(alt<dist[n.to]){

dist[n.to]=alt
prev[n.to]=u
prevType[n.to]=n.type

}

})

}

let path=[]
let types=[]

let u=target

while(u!==null){

path.unshift(u)

types.unshift(prevType[u])

u=prev[u]

}

types.shift()

let text=""

for(let i=0;i<path.length;i++){

text+=cities[path[i]].name

if(i<types.length){

text+=" → ("+types[i]+") → "

}

}

text+="<br><br>Total cost: "+dist[target]

document.getElementById("routeResult").innerHTML=text

}

renderCities()
renderDistances()

</script>

</body>
</html>
