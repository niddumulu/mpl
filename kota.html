<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>MPL Route Calculator</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
padding:10px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:15px;
border-radius:10px;
}

input,select,textarea,button{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#2c7be5;
color:white;
border:none;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

td,th{
border:1px solid #ddd;
padding:6px;
font-size:14px;
}

.row{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.row div{
flex:1;
}

.result{
background:#eef7ff;
padding:10px;
border-radius:6px;
}

</style>

</head>

<body>

<div class="container">

<h2>User</h2>
<input id="userNation" placeholder="Kewarganegaraan user">

<h2>Import Kota</h2>
<textarea id="bulkCities" rows="5" placeholder="Jakarta,Indonesia"></textarea>
<button onclick="importCities()">Import Kota</button>

<h2>Tambah Kota</h2>

<div class="row">
<div>
<input id="cityName" placeholder="Nama kota">
</div>

<div>
<input id="cityCountry" placeholder="Negara">
</div>
</div>

<button onclick="addCity()">Tambah</button>

<h2>Daftar Kota</h2>

<table id="cityTable">

<thead>
<tr>
<th>Kota</th>
<th>Negara</th>
<th>Hapus</th>
</tr>
</thead>

<tbody></tbody>

</table>

<h2>Tambah Jarak</h2>

<div class="row">

<div>
<select id="cityA"></select>
</div>

<div>
<select id="cityB"></select>
</div>

<div>
<input id="distanceKM" type="number" placeholder="KM">
</div>

</div>

<button onclick="addDistance()">Tambah Jarak</button>

<h2>Daftar Jarak</h2>

<table id="distanceTable">

<thead>
<tr>
<th>Kota A</th>
<th>Kota B</th>
<th>KM</th>
<th>Hapus</th>
</tr>
</thead>

<tbody></tbody>

</table>

<h2>Cari Rute</h2>

<div class="row">

<div>
<select id="startCity"></select>
</div>

<div>
<select id="targetCity"></select>
</div>

</div>

<button onclick="findRoute()">Cari Rute</button>

<div id="routeResult" class="result"></div>

</div>

<script>

let cities=JSON.parse(localStorage.getItem("cities")||"[]")
let distances=JSON.parse(localStorage.getItem("distances")||"[]")

function save(){
localStorage.setItem("cities",JSON.stringify(cities))
localStorage.setItem("distances",JSON.stringify(distances))
}

function refreshDropdown(){

let ids=["cityA","cityB","startCity","targetCity"]

ids.forEach(id=>{

let select=document.getElementById(id)

select.innerHTML=""

cities.forEach((c,i)=>{

let opt=document.createElement("option")
opt.value=i
opt.textContent=c.name+" ("+c.country+")"

select.appendChild(opt)

})

})

}

function renderCities(){

let tbody=document.querySelector("#cityTable tbody")
tbody.innerHTML=""

cities.forEach((c,i)=>{

let tr=document.createElement("tr")

tr.innerHTML=
"<td>"+c.name+"</td>"+
"<td>"+c.country+"</td>"+
"<td><button onclick='deleteCity("+i+")'>X</button></td>"

tbody.appendChild(tr)

})

refreshDropdown()
save()

}

function addCity(){

let name=document.getElementById("cityName").value.trim()
let country=document.getElementById("cityCountry").value.trim()

if(!name||!country)return

cities.push({name,country})

document.getElementById("cityName").value=""
document.getElementById("cityCountry").value=""

renderCities()

}

function deleteCity(i){

cities.splice(i,1)
renderCities()

}

function importCities(){

let text=document.getElementById("bulkCities").value.trim()

if(!text)return

let lines=text.split("\n")

lines.forEach(line=>{

line=line.trim()

if(!line)return

let parts

if(line.includes(",")) parts=line.split(",")
else if(line.includes("|")) parts=line.split("|")
else if(line.includes("-")) parts=line.split("-")
else parts=line.split(" ")

if(parts.length>=2){

let city=parts[0].trim()
let country=parts[1].trim()

cities.push({
name:city,
country:country
})

}

})

document.getElementById("bulkCities").value=""

renderCities()

}

function renderDistances(){

let tbody=document.querySelector("#distanceTable tbody")

tbody.innerHTML=""

distances.forEach((d,i)=>{

let tr=document.createElement("tr")

tr.innerHTML=
"<td>"+cities[d.a].name+"</td>"+
"<td>"+cities[d.b].name+"</td>"+
"<td>"+d.km+"</td>"+
"<td><button onclick='deleteDistance("+i+")'>X</button></td>"

tbody.appendChild(tr)

})

save()

}

function addDistance(){

let a=parseInt(document.getElementById("cityA").value)
let b=parseInt(document.getElementById("cityB").value)
let km=parseFloat(document.getElementById("distanceKM").value)

if(isNaN(a)||isNaN(b)||isNaN(km))return

distances.push({a,b,km})

document.getElementById("distanceKM").value=""

renderDistances()

}

function deleteDistance(i){

distances.splice(i,1)

renderDistances()

}

function neighbors(cityIndex,userNation){

let list=[]

distances.forEach(d=>{

if(d.a==cityIndex){

let type="travel"
let weight=d.km

if(
cities[d.a].country==userNation &&
cities[d.b].country==userNation
){
type="angkot"
weight=0.5
}

list.push({to:d.b,weight,type})

}

if(d.b==cityIndex){

let type="travel"
let weight=d.km

if(
cities[d.a].country==userNation &&
cities[d.b].country==userNation
){
type="angkot"
weight=0.5
}

list.push({to:d.a,weight,type})

}

})

return list

}

function findRoute(){

let start=parseInt(document.getElementById("startCity").value)
let target=parseInt(document.getElementById("targetCity").value)
let nation=document.getElementById("userNation").value.trim()

let dist=[]
let prev=[]
let type=[]

cities.forEach((c,i)=>{

dist[i]=Infinity
prev[i]=null

})

dist[start]=0

let visited=[]

while(true){

let u=-1
let best=Infinity

dist.forEach((d,i)=>{

if(!visited[i]&&d<best){
best=d
u=i
}

})

if(u==-1||u==target)break

visited[u]=true

neighbors(u,nation).forEach(n=>{

let alt=dist[u]+n.weight

if(alt<dist[n.to]){

dist[n.to]=alt
prev[n.to]=u
type[n.to]=n.type

}

})

}

let path=[]
let types=[]

let u=target

while(u!=null){

path.unshift(u)
types.unshift(type[u])
u=prev[u]

}

types.shift()

let result=""

for(let i=0;i<path.length;i++){

result+=cities[path[i]].name

if(i<types.length){

result+=" → ("+types[i]+") → "

}

}

result+="<br><br>Total cost: "+dist[target]

document.getElementById("routeResult").innerHTML=result

}

renderCities()
renderDistances()

</script>

</body>
</html>
