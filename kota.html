<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MPL Route Finder</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:10px;
}

.container{
background:white;
padding:15px;
border-radius:10px;
max-width:900px;
margin:auto;
}

input,select,button{
width:100%;
padding:12px;
margin-top:8px;
font-size:16px;
box-sizing:border-box;
}

button{
background:#2d7ef7;
color:white;
border:none;
border-radius:8px;
}

.box{
background:#f7f7f7;
padding:10px;
border-radius:6px;
margin-top:10px;
max-height:180px;
overflow:auto;
}

.result{
background:#e9f3ff;
padding:15px;
border-radius:6px;
margin-top:15px;
}

</style>
</head>

<body>

<div class="container">

<h2>Negara User</h2>
<input id="homeCountry" placeholder="Contoh: Indonesia">

<h2>Tambah Kota</h2>

<input id="cityName" placeholder="Nama Kota">
<input id="countryName" placeholder="Negara Kota">

<button onclick="addCity()">Tambah Kota</button>

<div class="box" id="cityList"></div>


<h2>Tambah Travel Antar Negara</h2>

<select id="cityA"></select>
<select id="cityB"></select>

<input id="distance" type="number" placeholder="Jarak km">

<button onclick="addRoute()">Tambah Travel</button>

<div class="box" id="routeList"></div>


<h2>Cari Rute</h2>

<select id="startCity"></select>
<select id="endCity"></select>

<button onclick="findRoute()">Cari Rute</button>

<div class="result" id="result"></div>

</div>

<script>

let cities={}
let graph={}

function saveData(){

localStorage.setItem("cities",JSON.stringify(cities))
localStorage.setItem("graph",JSON.stringify(graph))

}

function loadData(){

let c=localStorage.getItem("cities")
let g=localStorage.getItem("graph")

if(c) cities=JSON.parse(c)
if(g) graph=JSON.parse(g)

updateDropdowns()
updateLists()

}

function addCity(){

let city=document.getElementById("cityName").value.trim()
let country=document.getElementById("countryName").value.trim()

if(!city || !country) return

cities[city]=country

if(!graph[city]) graph[city]={}

document.getElementById("cityName").value=""
document.getElementById("countryName").value=""

saveData()
updateDropdowns()
updateLists()

}

function addRoute(){

let a=document.getElementById("cityA").value
let b=document.getElementById("cityB").value
let d=parseFloat(document.getElementById("distance").value)

if(!a || !b || isNaN(d)) return

if(!graph[a]) graph[a]={}
if(!graph[b]) graph[b]={}

graph[a][b]=d
graph[b][a]=d

document.getElementById("distance").value=""

saveData()
updateLists()

}

function updateDropdowns(){

let selects=["cityA","cityB","startCity","endCity"]

selects.forEach(id=>{

let s=document.getElementById(id)
s.innerHTML=""

for(let c in cities){

let opt=document.createElement("option")
opt.value=c
opt.text=c+" ("+cities[c]+")"

s.appendChild(opt)

}

})

}

function updateLists(){

let cityHTML="<b>Kota:</b><br>"

for(let c in cities){

cityHTML+=c+" ("+cities[c]+")<br>"

}

document.getElementById("cityList").innerHTML=cityHTML

let routeHTML="<b>Travel Routes:</b><br>"

let shown=new Set()

for(let a in graph){

for(let b in graph[a]){

let key=[a,b].sort().join("-")

if(!shown.has(key)){

routeHTML+=a+" ⇄ "+b+" : "+graph[a][b]+" km<br>"
shown.add(key)

}

}

}

document.getElementById("routeList").innerHTML=routeHTML

}

function getNeighbors(city,userCountry){

let list=[]

/* ANGKOT ke semua kota dalam negara user */

if(cities[city]===userCountry){

for(let c in cities){

if(c!==city && cities[c]===userCountry){

list.push({
city:c,
cost:0.5,
type:"angkot"
})

}

}

}

/* TRAVEL antar negara */

if(graph[city]){

for(let n in graph[city]){

if(cities[n]!==cities[city]){

list.push({
city:n,
cost:graph[city][n],
type:"travel"
})

}

}

}

return list

}

function findRoute(){

let userCountry=document.getElementById("homeCountry").value.trim()
let start=document.getElementById("startCity").value
let end=document.getElementById("endCity").value

let dist={}
let prev={}
let prevType={}
let visited=new Set()

for(let c in cities){

dist[c]=Infinity
prev[c]=null

}

dist[start]=0

while(true){

let closest=null

for(let c in dist){

if(!visited.has(c)){

if(closest===null || dist[c]<dist[closest]){
closest=c
}

}

}

if(closest===null) break
if(closest===end) break

visited.add(closest)

let neighbors=getNeighbors(closest,userCountry)

neighbors.forEach(n=>{

let newDist=dist[closest]+n.cost

if(newDist<dist[n.city]){

dist[n.city]=newDist
prev[n.city]=closest
prevType[n.city]=n.type

}

})

}

let path=[]
let types=[]
let cur=end

while(cur){

path.unshift(cur)
types.unshift(prevType[cur])
cur=prev[cur]

}

types.shift()

let html="<b>Rute Terbaik:</b><br>"

for(let i=0;i<path.length;i++){

html+=path[i]

if(i<types.length){
html+=" → ("+types[i]+") → "
}

}

let totalKm=0

for(let i=0;i<types.length;i++){

if(types[i]==="travel"){

let a=path[i]
let b=path[i+1]

if(graph[a] && graph[a][b]){
totalKm+=graph[a][b]
}

}

}

html+="<br><br><b>Total Travel KM:</b> "+totalKm

document.getElementById("result").innerHTML=html

}

loadData()

</script>

</body>
</html>
