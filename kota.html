<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Route Finder MPL</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:10px;
}

.container{
background:white;
padding:15px;
border-radius:10px;
max-width:900px;
margin:auto;
}

input,select,button{
width:100%;
padding:12px;
margin-top:8px;
font-size:16px;
box-sizing:border-box;
}

button{
background:#2d7ef7;
color:white;
border:none;
border-radius:8px;
}

.box{
background:#f7f7f7;
padding:10px;
border-radius:6px;
margin-top:10px;
max-height:150px;
overflow:auto;
}

.result{
background:#e9f3ff;
padding:15px;
border-radius:6px;
margin-top:15px;
}

</style>
</head>

<body>

<div class="container">

<h2>Negara User</h2>

<input id="homeCountry" placeholder="Contoh: Indonesia">

<h2>Tambah Kota</h2>

<input id="cityName" placeholder="Nama Kota">
<input id="countryName" placeholder="Negara Kota">

<button onclick="addCity()">Tambah Kota</button>

<div class="box" id="cityList"></div>


<h2>Tambah Rute Antar Negara</h2>

<select id="cityA"></select>
<select id="cityB"></select>

<input id="distance" type="number" placeholder="Jarak km">

<button onclick="addRoute()">Tambah Rute</button>

<div class="box" id="routeList"></div>


<h2>Cari Rute</h2>

<select id="endCity"></select>

<button onclick="findRoute()">Cari</button>

<div class="result" id="result"></div>

</div>

<script>

let cities={}
let graph={}

function saveData(){

localStorage.setItem("cities",JSON.stringify(cities))
localStorage.setItem("graph",JSON.stringify(graph))

}

function loadData(){

let c=localStorage.getItem("cities")
let g=localStorage.getItem("graph")

if(c) cities=JSON.parse(c)
if(g) graph=JSON.parse(g)

updateDropdowns()
updateLists()

}

function addCity(){

let city=document.getElementById("cityName").value
let country=document.getElementById("countryName").value

if(!city)return

cities[city]=country

if(!graph[city])graph[city]={}

saveData()

updateDropdowns()
updateLists()

}

function addRoute(){

let a=document.getElementById("cityA").value
let b=document.getElementById("cityB").value
let d=parseFloat(document.getElementById("distance").value)

if(!graph[a])graph[a]={}
if(!graph[b])graph[b]={}

graph[a][b]=d
graph[b][a]=d

saveData()

updateLists()

}

function updateDropdowns(){

let selects=["cityA","cityB","endCity"]

selects.forEach(id=>{

let s=document.getElementById(id)
s.innerHTML=""

for(let c in cities){

let opt=document.createElement("option")
opt.value=c
opt.text=c

s.appendChild(opt)

}

})

}

function updateLists(){

let cityHTML="<b>Kota:</b><br>"

for(let c in cities){

cityHTML+=c+" ("+cities[c]+")<br>"

}

document.getElementById("cityList").innerHTML=cityHTML


let routeHTML="<b>Rute:</b><br>"

for(let a in graph){

for(let b in graph[a]){

routeHTML+=a+" → "+b+" : "+graph[a][b]+" km<br>"

}

}

document.getElementById("routeList").innerHTML=routeHTML

}

function findRoute(){

let homeCountry=document.getElementById("homeCountry").value
let end=document.getElementById("endCity").value

let dist={}
let prev={}
let visited=new Set()

for(let c in cities){

dist[c]=Infinity
prev[c]=null

}

for(let c in cities){

if(cities[c]===homeCountry){

dist[c]=0

}

}

while(true){

let closest=null

for(let c in dist){

if(!visited.has(c)){

if(closest===null || dist[c]<dist[closest]){
closest=c
}

}

}

if(closest===null)break
if(closest===end)break

visited.add(closest)

if(graph[closest]){

for(let n in graph[closest]){

let cost=graph[closest][n]

let newDist=dist[closest]+cost

if(newDist<dist[n]){

dist[n]=newDist
prev[n]=closest

}

}

}

}

let path=[]
let cur=end

while(cur){

path.unshift(cur)
cur=prev[cur]

}

let html="<b>Rute Terbaik:</b><br>"+path.join(" → ")

html+="<br><br><b>Total jarak:</b> "+dist[end]+" km"

document.getElementById("result").innerHTML=html

}

loadData()

</script>

</body>
</html>
