<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MyProfitLand Route Planner</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.box{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:8px;
box-shadow:0 0 5px rgba(0,0,0,0.1);
}

input,select,button,textarea{
padding:6px;
margin:3px;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
border:1px solid #ccc;
padding:6px;
}

.result{
background:#eef;
padding:10px;
margin-top:10px;
}
</style>

</head>

<body>

<h2>MyProfitLand Route Planner</h2>

<div class="box">

<h3>Import Kota Massal</h3>

<textarea id="massCity" rows="6" style="width:100%" placeholder="Jakarta
Bandung
Surabaya"></textarea>

<br>

<button onclick="importCities()">Import Kota</button>

</div>

<div class="box">

<h3>Daftar Kota</h3>

<table id="cityTable">
<thead>
<tr>
<th>Kota</th>
<th>Negara</th>
<th>Aksi</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<div class="box">

<h3>Input Jarak Kota</h3>

<select id="cityA"></select>

<select id="cityB"></select>

<input type="number" id="distance" placeholder="KM">

<button onclick="addDistance()">Tambah</button>

</div>

<div class="box">

<h3>Kewarganegaraan User</h3>

<input id="userCountry" placeholder="Indonesia">

</div>

<div class="box">

<h3>Cari Rute</h3>

<select id="startCity"></select>

<select id="endCity"></select>

<button onclick="findRoute()">Cari</button>

<div id="result" class="result"></div>

</div>

<script>

let cities = JSON.parse(localStorage.getItem("mpl_cities")||"{}");
let roads = JSON.parse(localStorage.getItem("mpl_roads")||"[]");

function save(){

localStorage.setItem("mpl_cities",JSON.stringify(cities));
localStorage.setItem("mpl_roads",JSON.stringify(roads));

}

function importCities(){

let lines=document.getElementById("massCity").value.split("\n");

lines.forEach(c=>{
c=c.trim();
if(c){
cities[c]={country:""};
}
});

save();
renderCities();
refreshSelect();

}

function renderCities(){

let tbody=document.querySelector("#cityTable tbody");
tbody.innerHTML="";

for(let c in cities){

let tr=document.createElement("tr");

tr.innerHTML=`
<td>${c}</td>
<td><input value="${cities[c].country}" onchange="setCountry('${c}',this.value)"></td>
<td><button onclick="deleteCity('${c}')">hapus</button></td>
`;

tbody.appendChild(tr);

}

}

function setCountry(city,val){

cities[city].country=val;
save();

}

function deleteCity(city){

delete cities[city];

roads=roads.filter(r=>r.a!=city && r.b!=city);

save();
renderCities();
refreshSelect();

}

function refreshSelect(){

let selects=["cityA","cityB","startCity","endCity"];

selects.forEach(id=>{

let el=document.getElementById(id);
el.innerHTML="";

for(let c in cities){

let opt=document.createElement("option");
opt.textContent=c;
opt.value=c;

el.appendChild(opt);

}

});

}

function addDistance(){

let a=document.getElementById("cityA").value;
let b=document.getElementById("cityB").value;
let d=parseFloat(document.getElementById("distance").value);

roads.push({a,b,d});

save();

}

function neighbors(city){

let list=[];

roads.forEach(r=>{

if(r.a==city) list.push({city:r.b,dist:r.d});
if(r.b==city) list.push({city:r.a,dist:r.d});

});

return list;

}

function findRoute(){

let start=document.getElementById("startCity").value;
let end=document.getElementById("endCity").value;
let userCountry=document.getElementById("userCountry").value;

let dist={};
let prev={};
let q=[];

for(let c in cities){

dist[c]=Infinity;
q.push(c);

}

dist[start]=0;

while(q.length){

q.sort((a,b)=>dist[a]-dist[b]);

let u=q.shift();

if(u==end) break;

neighbors(u).forEach(n=>{

let cost=n.dist;

let sameCountry=cities[u].country && cities[n.city].country &&
cities[u].country==cities[n.city].country;

if(sameCountry && cities[u].country==userCountry){

cost=0.5; // 30 menit

}

let alt=dist[u]+cost;

if(alt<dist[n.city]){

dist[n.city]=alt;
prev[n.city]=u;

}

});

}

let path=[];
let u=end;

while(u){

path.unshift(u);
u=prev[u];

}

document.getElementById("result").innerHTML=

"Rute: "+path.join(" → ")+"<br><br>Total jarak / waktu relatif: "+dist[end];

}

renderCities();
refreshSelect();

</script>

</body>
</html>
