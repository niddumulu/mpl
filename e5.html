<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Energy Optimizer PRO MAX</title>

<style>
body{
    font-family:Arial;
    background:#eef2f7;
    padding:20px;
}
.container{
    background:white;
    max-width:1100px;
    margin:auto;
    padding:25px;
    border-radius:12px;
    box-shadow:0 6px 18px rgba(0,0,0,0.1);
}
input,select,button{
    width:100%;
    padding:8px;
    margin:6px 0 15px 0;
}
button{
    background:#1e88e5;
    color:white;
    border:none;
    font-size:16px;
    cursor:pointer;
}
.card{
    background:#fff;
    padding:15px;
    margin-top:15px;
    border-radius:8px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}
.warning{color:#d32f2f;font-weight:bold;}
.good{color:#2e7d32;font-weight:bold;}
table{
    width:100%;
    border-collapse:collapse;
    font-size:12px;
}
th,td{
    border:1px solid #ccc;
    padding:4px;
    text-align:center;
}
</style>
</head>
<body>

<div class="container">
<h2>🔥 Energy Optimizer PRO MAX</h2>

<label>Energy Awal</label>
<input type="number" id="energyAwal" value="70">

<label>Waktu Sekarang (WIB)</label>
<input type="time" id="wibTime" value="14:00">

<label>Sudah Work Berapa Kali?</label>
<select id="workDone">
<option value="0">0</option>
<option value="1">1</option>
<option value="2">2</option>
</select>

<label>Minimal Energy Untuk Work</label>
<input type="number" id="minEnergy" value="70">

<label>Rumah Bonus / Jam</label>
<input type="number" id="house" value="0.83" step="0.01">

<label>Total Clothes Bonus / Jam</label>
<input type="number" id="clothes" value="2.1" step="0.01">

<button onclick="runOptimizer()">🔥 Hitung Strategi Terbaik</button>

<div id="output"></div>

</div>

<script>

function wibToServerMinutes(){
    let [h,m]=document.getElementById("wibTime").value.split(":").map(Number);
    let total=h*60+m;
    total-=(7*60+4);
    if(total<0) total+=1440;
    return total;
}

function simulate(hours){

    let energy=parseFloat(document.getElementById("energyAwal").value);
    let bonus=parseFloat(document.getElementById("house").value)+
              parseFloat(document.getElementById("clothes").value);

    let minEnergy=parseFloat(document.getElementById("minEnergy").value);

    let cooldown=4;
    let lastWork=-100;
    let workCount=parseInt(document.getElementById("workDone").value);

    let maxWork=3;
    let usedEnergy=0;

    let table=[];

    for(let i=1;i<=hours;i++){

        // decay
        let decay=energy*((energy/5000)+0.016);
        energy-=decay;
        energy+=bonus;

        if(energy>100) energy=100;
        if(energy<0) energy=0;

        let action="-";

        if(
            energy>=minEnergy &&
            i>=lastWork+cooldown &&
            workCount<maxWork
        ){
            action=(workCount<2)?"Work":"OT";
            usedEnergy+=energy;
            energy-=30;
            if(energy<0) energy=0;
            lastWork=i;
            workCount++;
        }

        table.push({
            hour:i,
            energy:energy.toFixed(2),
            action:action
        });
    }

    return {table,usedEnergy};
}

function runOptimizer(){

    let serverNow=wibToServerMinutes();
    let sisaJam=Math.floor((1440-serverNow)/60);

    let result=simulate(sisaJam);

    let html=`<div class="card">
    <strong>Sisa Jam sampai Reset: ${sisaJam}</strong><br>`;

    if(sisaJam<15){
        html+=`<div class="warning">⚠ Kurang dari 15 jam. OT sebaiknya dihindari.</div>`;
    }else{
        html+=`<div class="good">✔ Waktu cukup untuk strategi penuh.</div>`;
    }

    html+=`<hr>
    <strong>Total Energy Dipakai Hari Ini:</strong> ${result.usedEnergy.toFixed(2)}
    </div>`;

    html+=`<div class="card">
    <h3>Detail Simulasi</h3>
    <table>
    <tr><th>Jam</th><th>Energy</th><th>Aksi</th></tr>`;

    result.table.forEach(row=>{
        html+=`<tr>
        <td>${row.hour}</td>
        <td>${row.energy}</td>
        <td>${row.action}</td>
        </tr>`;
    });

    html+=`</table></div>`;

    document.getElementById("output").innerHTML=html;
}

</script>

</body>
</html>
