<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulator Work Strategi Cerdas</title>

<style>
body{font-family:Arial;background:#f4f6f9;padding:15px;}
.container{background:white;max-width:850px;margin:auto;padding:20px;border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,0.1);}
input,select,button{width:100%;padding:8px;margin:5px 0 15px 0;}
button{background:#2d89ef;color:white;border:none;cursor:pointer;font-size:16px;}
button:hover{background:#1b5fa7;}
.card{background:#fff;padding:15px;border-radius:8px;margin-top:15px;box-shadow:0 2px 6px rgba(0,0,0,0.08);}
h2{text-align:center;}
.good{color:green;font-weight:bold;}
.warn{color:orange;font-weight:bold;}
</style>
</head>
<body>

<div class="container">
<h2>🔥 Simulator Work Optimal (Adaptive Strategy)</h2>

<label>Energy Awal (0-100)</label>
<input type="number" id="energyAwal" value="70" min="0" max="100">

<label>Waktu WIB Saat Ini</label>
<input type="time" id="waktuWIB">

<label>Pilih Rumah</label>
<select id="house">
<option value="0">Tidak Ada</option>
<option value="0.50">Small House (+0.50/jam)</option>
<option value="0.83">Nice Apartment (+0.83/jam)</option>
<option value="1.46">Mansion (+1.46/jam)</option>
<option value="1.67">Castle (+1.67/jam)</option>
</select>

<label>Jumlah Clothes ⭐ (0.42/jam)</label>
<input type="number" id="star1" value="0" min="0">

<label>Jumlah Clothes ⭐⭐ (1.25/jam)</label>
<input type="number" id="star2" value="0" min="0">

<button onclick="cariStrategi()">🔥 Hitung Strategi Terbaik</button>

<div id="output"></div>
</div>

<script>

// ================= BONUS
function hitungBonus(){
    let house=parseFloat(document.getElementById("house").value);
    let s1=parseInt(document.getElementById("star1").value)||0;
    let s2=parseInt(document.getElementById("star2").value)||0;
    return house+(s1*0.42)+(s2*1.25);
}

// ================= WIB ➜ SERVER
function WIBtoServerHour(){
    let waktu=document.getElementById("waktuWIB").value;
    if(!waktu) return 1;
    let [h,m]=waktu.split(":").map(Number);
    let total=h*60+m-(7*60+4);
    while(total<0) total+=1440;
    return Math.floor(total/60)+1;
}

// ================= SERVER ➜ WIB
function serverToWIB(serverHour){
    let min=(serverHour-1)*60+(7*60+4);
    if(min>=1440) min-=1440;
    let h=Math.floor(min/60).toString().padStart(2,"0");
    let m=(min%60).toString().padStart(2,"0");
    return h+":"+m;
}

// ================= SIMULASI
function simulasi(workTimes,startHour){

    let energy=parseFloat(document.getElementById("energyAwal").value);
    let bonus=hitungBonus();
    let lastWork=-10;
    let beforeEnergy=[];
    let valid=true;

    for(let i=startHour;i<=24;i++){

        let decay=energy*((energy/5000)+0.016);
        energy-=decay;
        energy+=bonus;
        if(energy<10) energy+=1;

        if(workTimes.includes(i)){

            if(i<lastWork+4) valid=false;

            beforeEnergy.push(energy.toFixed(2));

            if(energy>=70){
                energy*=0.75;
                lastWork=i;
            }else{
                valid=false;
            }
        }

        if(energy>100) energy=100;
        if(energy<0) energy=0;
    }

    return {
        final:parseFloat(energy.toFixed(2)),
        before:beforeEnergy,
        valid:valid
    };
}

// ================= STRATEGI
function cariStrategi(){

    let start=WIBtoServerHour();
    let sisaJam=24-start;

    let best=null;

    // ==== Coba 2x work
    for(let j1=start;j1<=24;j1++){
        for(let j2=j1+4;j2<=24;j2++){

            let result=simulasi([j1,j2],start);

            if(!best||result.final>best.final){
                best={type:"2x Work",times:[j1,j2],data:result};
            }
        }
    }

    // ==== Coba 3x jika waktu cukup (minimal 8 jam jarak)
    if(sisaJam>=8){
        for(let j1=start;j1<=24;j1++){
            for(let j2=j1+4;j2<=24;j2++){
                for(let j3=j2+4;j3<=24;j3++){

                    let result=simulasi([j1,j2,j3],start);

                    if(result.final>best.final){
                        best={type:"3x Work (OT)",times:[j1,j2,j3],data:result};
                    }
                }
            }
        }
    }

    let status=best.data.valid?"good":"warn";
    let statusText=best.data.valid?"Memenuhi ≥70":"Tidak semua ≥70 tapi paling optimal";

    let listEnergy="";
    best.data.before.forEach((e,i)=>{
        listEnergy+=`<li>Work ${i+1}: ${e}</li>`;
    });

    document.getElementById("output").innerHTML=`
    <div class="card">
    <h3>🔥 Strategi Terbaik</h3>

    <p><strong>Tipe:</strong> ${best.type}</p>
    <p class="${status}"><strong>Status:</strong> ${statusText}</p>

    <hr>

    ${best.times.map((t,i)=>`Work ${i+1}: ${serverToWIB(t)} WIB`).join("<br>")}

    <hr>
    <p><strong>Energy Sebelum Work:</strong></p>
    <ul>${listEnergy}</ul>

    <hr>
    <strong>Energy Akhir Hari: ${best.data.final}</strong>
    </div>
    `;
}

</script>

</body>
</html>
