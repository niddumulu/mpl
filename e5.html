<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Energy Work Optimizer</title>

<style>
body{
    font-family:Arial;
    background:#111;
    color:white;
    padding:20px;
}
.card{
    background:#1e1e1e;
    padding:20px;
    margin-top:20px;
    border-radius:10px;
}
input,select,button{
    padding:8px;
    margin:5px 0;
    width:100%;
}
button{
    background:#00b894;
    color:white;
    border:none;
    cursor:pointer;
}
button:hover{
    background:#019875;
}
</style>
</head>

<body>

<h2>🔥 Energy Optimizer (No Threshold)</h2>

<label>Energy Awal</label>
<input type="number" id="energy" value="60">

<label>Jam Server Tersisa</label>
<input type="number" id="hoursLeft" value="7">

<label>Rumah</label>
<select id="house">
<option value="0">Tidak Ada</option>
<option value="0.50">Small House</option>
<option value="0.83">Nice Apartment</option>
<option value="1.46">Mansion</option>
<option value="1.67" selected>General's Castle</option>
</select>

<label>Clothes ⭐ (bintang 1)</label>
<input type="number" id="clothes1" value="3">

<label>Clothes ⭐⭐ (bintang 2)</label>
<input type="number" id="clothes2" value="0">

<label>Work sudah dilakukan hari ini</label>
<input type="number" id="workDone" value="0">

<button onclick="optimize()">Cari Kombinasi Terbaik</button>

<div id="output"></div>

<script>

function totalBonusPerHour(){
    let house=parseFloat(document.getElementById("house").value);
    let c1=parseInt(document.getElementById("clothes1").value);
    let c2=parseInt(document.getElementById("clothes2").value);

    let clothesBonus=(c1*0.042)+(c2*0.125);

    return house+clothesBonus;
}

function simulate(schedule,hours){

    let energy=parseFloat(document.getElementById("energy").value);
    let totalUsed=0;
    let cooldown=-999;

    for(let h=1;h<=hours;h++){

        let decay=energy*((energy/5000)+0.016);
        energy-=decay;

        energy+=totalBonusPerHour();

        if(energy<10){
            energy+=1;
        }

        if(schedule.includes(h) && h-cooldown>=4){
            totalUsed+=energy;
            energy-=25;
            cooldown=h;
        }
    }

    return totalUsed;
}

function validSchedule(schedule){
    for(let i=1;i<schedule.length;i++){
        if(schedule[i]-schedule[i-1]<4){
            return false;
        }
    }
    return true;
}

function optimize(){

    let hours=parseInt(document.getElementById("hoursLeft").value);
    let workDone=parseInt(document.getElementById("workDone").value);
    let maxWork=3-workDone;

    let bestEnergy=-1;
    let bestSchedule=[];

    function combine(start,path){

        if(path.length>maxWork) return;

        if(validSchedule(path)){
            let score=simulate(path,hours);
            if(score>bestEnergy){
                bestEnergy=score;
                bestSchedule=[...path];
            }
        }

        for(let i=start;i<=hours;i++){
            path.push(i);
            combine(i+1,path);
            path.pop();
        }
    }

    combine(1,[]);

    let html=`<div class="card">`;

    if(bestEnergy<=0){
        html+=`Tidak ada kombinasi optimal ditemukan.`;
    }else{
        html+=`<h3>🎯 Strategi Terbaik</h3>`;
        bestSchedule.forEach((h,i)=>{
            if(i<2){
                html+=`✅ Work di jam ke-${h}<br>`;
            }else{
                html+=`🔥 OT di jam ke-${h}<br>`;
            }
        });

        html+=`<hr>Total Energy Maksimal: <b>${bestEnergy.toFixed(2)}</b>`;
    }

    html+=`</div>`;

    document.getElementById("output").innerHTML=html;
}

</script>

</body>
</html>
