<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulator Work Berdasarkan Waktu Sekarang</title>

<style>
body{font-family:Arial;background:#f4f6f9;padding:15px;}
.container{background:white;max-width:800px;margin:auto;padding:20px;border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,0.1);}
input,select,button{width:100%;padding:8px;margin:5px 0 15px 0;}
button{background:#2d89ef;color:white;border:none;cursor:pointer;font-size:16px;}
button:hover{background:#1b5fa7;}
.card{background:#fff;padding:15px;border-radius:8px;margin-top:15px;box-shadow:0 2px 6px rgba(0,0,0,0.08);}
h2{text-align:center;}
</style>
</head>
<body>

<div class="container">
<h2>🔥 Simulator Work Optimal (Realtime WIB)</h2>

<label>Energy Awal (0-100)</label>
<input type="number" id="energyAwal" value="80" min="0" max="100">

<label>Waktu WIB Saat Ini</label>
<input type="time" id="waktuWIB">

<label>Pilih Rumah</label>
<select id="house">
<option value="0">Tidak Ada</option>
<option value="0.50">Small House (+0.50/jam)</option>
<option value="0.83">Nice Apartment (+0.83/jam)</option>
<option value="1.46">Mansion (+1.46/jam)</option>
<option value="1.67">Castle (+1.67/jam)</option>
</select>

<label>Jumlah Clothes ⭐ (0.42/jam)</label>
<input type="number" id="star1" value="0" min="0">

<label>Jumlah Clothes ⭐⭐ (1.25/jam)</label>
<input type="number" id="star2" value="0" min="0">

<button onclick="cariOptimal()">🔥 Hitung Strategi Terbaik</button>

<div id="output"></div>
</div>

<script>

// ======================
// BONUS
// ======================
function hitungBonus(){
    let house = parseFloat(document.getElementById("house").value);
    let s1 = parseInt(document.getElementById("star1").value) || 0;
    let s2 = parseInt(document.getElementById("star2").value) || 0;
    return house + (s1*0.42) + (s2*1.25);
}

// ======================
// WIB ➜ SERVER
// ======================
function WIBtoServerHour(){

    let waktu = document.getElementById("waktuWIB").value;
    if(!waktu) return 1;

    let [h,m] = waktu.split(":").map(Number);

    let totalMinutes = h*60 + m;

    // Kurangi 7 jam 4 menit
    totalMinutes -= (7*60 + 4);

    while(totalMinutes < 0) totalMinutes += 1440;

    let serverHour = Math.floor(totalMinutes / 60) + 1;
    return serverHour;
}

// ======================
// SERVER ➜ WIB
// ======================
function serverToWIB(serverHour){
    let minutes = (serverHour-1)*60;
    minutes += (7*60 + 4);
    if(minutes>=1440) minutes-=1440;
    let h=Math.floor(minutes/60).toString().padStart(2,"0");
    let m=(minutes%60).toString().padStart(2,"0");
    return h+":"+m;
}

// ======================
// SIMULASI
// ======================
function simulasi(j1,j2,j3,startHour){

    let energy=parseFloat(document.getElementById("energyAwal").value);
    let bonus=hitungBonus();
    let lastWork=-10;
    let workCount=0;
    let otUsed=false;
    let valid=true;

    for(let i=startHour;i<=24;i++){

        let decay=energy*((energy/5000)+0.016);
        energy-=decay;
        energy+=bonus;
        if(energy<10) energy+=1;

        if(i===j1||i===j2||i===j3){

            if(i<lastWork+4) valid=false;

            if(i===j3){
                if(workCount===2&&energy>=70&&!otUsed){
                    energy*=0.75;
                    otUsed=true;
                    lastWork=i;
                }else valid=false;
            }else{
                if(workCount<2&&energy>=70){
                    energy*=0.75;
                    workCount++;
                    lastWork=i;
                }else valid=false;
            }
        }

        if(energy>100) energy=100;
        if(energy<0) energy=0;
    }

    return {final:energy.toFixed(2),valid:valid};
}

// ======================
// CARI STRATEGI TERBAIK
// ======================
function cariOptimal(){

    let start=WIBtoServerHour();

    let best=null;
    let bestScore=-1;

    for(let j1=start;j1<=24;j1++){
        for(let j2=j1+4;j2<=24;j2++){
            for(let j3=j2+4;j3<=24;j3++){

                let result=simulasi(j1,j2,j3,start);
                let score=parseFloat(result.final);

                if(score>bestScore){
                    bestScore=score;
                    best={j1,j2,j3,result};
                }
            }
        }
    }

    let status=best.result.valid
        ?"✅ Memenuhi ≥70"
        :"⚠ Tidak memenuhi ≥70 tapi paling optimal";

    document.getElementById("output").innerHTML=`
    <div class="card">
    <h3>🔥 Strategi Terbaik Dari Jam Sekarang</h3>

    <p><strong>Status:</strong> ${status}</p>
    <hr>

    <p>Work 1 : ${serverToWIB(best.j1)} WIB</p>
    <p>Work 2 : ${serverToWIB(best.j2)} WIB</p>
    <p>OT : ${serverToWIB(best.j3)} WIB</p>

    <hr>
    <strong>Energy Akhir Hari: ${best.result.final}</strong>
    </div>
    `;
}

</script>

</body>
</html>
