<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Energy Combination Optimizer</title>

<style>
body{
    font-family:Arial;
    background:#eef2f7;
    padding:20px;
}
.container{
    background:white;
    max-width:1100px;
    margin:auto;
    padding:25px;
    border-radius:12px;
    box-shadow:0 6px 18px rgba(0,0,0,0.1);
}
input,select,button{
    width:100%;
    padding:8px;
    margin:6px 0 15px 0;
}
button{
    background:#1e88e5;
    color:white;
    border:none;
    font-size:16px;
    cursor:pointer;
}
.card{
    background:#fff;
    padding:15px;
    margin-top:15px;
    border-radius:8px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}
.good{color:#2e7d32;font-weight:bold;}
.warning{color:#d32f2f;font-weight:bold;}
</style>
</head>
<body>

<div class="container">
<h2>🔥 Energy TRUE Optimizer (Best Combination)</h2>

<label>Energy Awal</label>
<input type="number" id="energyAwal" value="70">

<label>Waktu Sekarang (WIB)</label>
<input type="time" id="wibTime" value="14:00">

<label>Sudah Work Berapa Kali?</label>
<select id="workDone">
<option value="0">0</option>
<option value="1">1</option>
<option value="2">2</option>
</select>

<label>Minimal Energy Untuk Work</label>
<input type="number" id="minEnergy" value="70">

<label>Rumah</label>
<select id="house">
<option value="0">Tidak Ada</option>
<option value="0.50">Small House</option>
<option value="0.83">Nice Apartment</option>
<option value="1.46">Mansion</option>
<option value="1.67">Castle</option>
</select>

<label>Clothes ⭐</label>
<input type="number" id="star1" value="5">

<label>Clothes ⭐⭐</label>
<input type="number" id="star2" value="0">

<button onclick="optimize()">🔥 Cari Kombinasi Terbaik</button>

<div id="output"></div>
</div>

<script>

function bonusPerJam(){
    let house=parseFloat(document.getElementById("house").value);
    let s1=parseInt(document.getElementById("star1").value)||0;
    let s2=parseInt(document.getElementById("star2").value)||0;
    return house + (s1*0.42) + (s2*1.25);
}

function wibToServerMinutes(){
    let [h,m]=document.getElementById("wibTime").value.split(":").map(Number);
    let total=h*60+m;
    total-=(7*60+4);
    if(total<0) total+=1440;
    return total;
}

function simulate(schedule, hours){

    let energy=parseFloat(document.getElementById("energyAwal").value);
    let minEnergy=parseFloat(document.getElementById("minEnergy").value);
    let bonus=bonusPerJam();

    let totalUsed=0;

    for(let i=1;i<=hours;i++){

        let decay=energy*((energy/5000)+0.016);
        energy-=decay;
        energy+=bonus;

        if(energy>100) energy=100;
        if(energy<0) energy=0;

        if(schedule.includes(i)){
            if(energy<minEnergy) return -1;
            totalUsed+=energy;
            energy-=30;
            if(energy<0) energy=0;
        }
    }

    return totalUsed;
}

function validSchedule(schedule){

    for(let i=1;i<schedule.length;i++){
        if(schedule[i]-schedule[i-1] < 4) return false;
    }
    return true;
}

function optimize(){

    let serverNow=wibToServerMinutes();
    let hours=Math.floor((1440-serverNow)/60);

    let workDone=parseInt(document.getElementById("workDone").value);
    let maxWork=3-workDone;

    let bestEnergy=0;
    let bestSchedule=[];

    function combine(start, path){

        if(path.length>maxWork) return;

        if(validSchedule(path)){
            let score=simulate(path,hours);
            if(score>bestEnergy){
                bestEnergy=score;
                bestSchedule=[...path];
            }
        }

        for(let i=start;i<=hours;i++){
            path.push(i);
            combine(i+1,path);
            path.pop();
        }
    }

    combine(1,[]);

    let html=`<div class="card">
    <strong>Kombinasi Terbaik:</strong><br>`;

    if(bestSchedule.length===0){
        html+=`Tidak ada kombinasi valid.`;
    }else{
        bestSchedule.forEach((h,index)=>{
            html+=`${index<2?'Work':'OT'} di jam ke-${h}<br>`;
        });
        html+=`<hr><strong>Total Energy Dipakai:</strong> ${bestEnergy.toFixed(2)}`;
    }

    html+=`</div>`;

    document.getElementById("output").innerHTML=html;
}

</script>

</body>
</html>
