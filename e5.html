<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulasi Energy MPL</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    padding:20px;
}
.container{
    background:white;
    padding:20px;
    border-radius:10px;
    max-width:500px;
    margin:auto;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
h2{
    text-align:center;
}
input, button{
    width:100%;
    padding:10px;
    margin-top:10px;
    font-size:16px;
}
button{
    background:#2c7be5;
    color:white;
    border:none;
    cursor:pointer;
}
button:hover{
    background:#1a68d1;
}
.result{
    margin-top:20px;
    padding:15px;
    background:#eef3ff;
    border-radius:8px;
}
.safe{
    color:green;
    font-weight:bold;
}
.warning{
    color:red;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">
<h2>Simulasi Energy Work</h2>

<label>Input Energi Saat Ini:</label>
<input type="number" id="energyInput" placeholder="Masukkan energi sekarang">

<button onclick="hitung()">Cek Status</button>

<div class="result" id="output"></div>
</div>

<script>
function hitung(){

    const minWork = 35;
    const targetSafe = 60;
    const regenPerJam = 3; // asumsi rata-rata regen bersih
    const now = new Date();
    const currentHour = now.getHours();

    let energy = parseFloat(document.getElementById("energyInput").value);
    let output = document.getElementById("output");

    if(isNaN(energy)){
        output.innerHTML = "Masukkan energi yang valid.";
        return;
    }

    let nextWorkHour;

    // Tentukan work berikutnya
    if(currentHour < 8){
        nextWorkHour = 8;
    } else if(currentHour < 20){
        nextWorkHour = 20;
    } else {
        nextWorkHour = 32; // 08 besok (24 + 8)
    }

    let hoursToWait = nextWorkHour - currentHour;

    // Hitung estimasi energi saat jam work
    let estimatedEnergy = energy + (hoursToWait * regenPerJam);

    let html = "<b>Jam sekarang:</b> " + currentHour + ":00<br>";
    html += "<b>Work berikutnya:</b> " + (nextWorkHour % 24) + ":00<br><br>";

    if(energy >= targetSafe){
        html += "<span class='safe'>Energi aman untuk work sekarang.</span>";
    }
    else if(estimatedEnergy >= targetSafe){
        html += "<span class='warning'>Energi belum aman.</span><br>";
        html += "Disarankan menunggu sekitar <b>" + hoursToWait + " jam</b> sampai jam ";
        html += "<b>" + (nextWorkHour % 24) + ":00</b>.<br>";
        html += "Estimasi energi saat itu: <b>" + Math.floor(estimatedEnergy) + "</b>";
    }
    else{
        html += "<span class='warning'>Energi terlalu rendah.</span><br>";
        html += "Bahkan menunggu sampai jam work berikutnya belum cukup.<br>";
        html += "Pertimbangkan beli koran sebelum work.";
    }

    output.innerHTML = html;
}
</script>

</body>
</html>
