<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulasi Work 24 Jam</title>

<style>
body{
    font-family:Arial;
    background:#f4f6f9;
    padding:15px;
}
.container{
    background:white;
    max-width:650px;
    margin:auto;
    padding:15px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
select,input,button{
    width:100%;
    padding:8px;
    margin:5px 0 15px 0;
}
button{
    background:#2d89ef;
    color:white;
    border:none;
    cursor:pointer;
}
button:hover{
    background:#1b5fa7;
}
.card{
    background:#fff;
    padding:10px;
    border-radius:8px;
    margin-top:8px;
    box-shadow:0 2px 5px rgba(0,0,0,0.08);
}
.hidden{display:none;}
</style>
</head>
<body>

<div class="container">
<h2>⚡ Simulasi Work 24 Jam</h2>

<label>Energy Awal</label>
<input type="number" id="energyAwal" value="100" min="0" max="100">

<label>Jam Kerja 1</label>
<select id="jam1"></select>

<label>Jam Kerja 2</label>
<select id="jam2"></select>

<div id="otContainer" class="hidden">
<label>Jam Lembur (OT)</label>
<select id="jamOT"></select>
</div>

<button onclick="simulasi()">Simulasi</button>
<button onclick="cariOptimal()">Cari Jam Optimal</button>

<div id="output"></div>

</div>

<script>

// generate dropdown 1-24
function generateJam(id){
    let select=document.getElementById(id);
    select.innerHTML="<option value=''>-- Pilih Jam --</option>";
    for(let i=1;i<=24;i++){
        select.innerHTML+=`<option value="${i}">${i}</option>`;
    }
}
generateJam("jam1");
generateJam("jam2");
generateJam("jamOT");

// tampilkan OT jika kerja 1 & 2 valid
document.getElementById("jam2").addEventListener("change",function(){
    let j1=parseInt(jam1.value);
    let j2=parseInt(jam2.value);
    if(j1 && j2 && j2>=j1+4){
        document.getElementById("otContainer").classList.remove("hidden");
    }else{
        document.getElementById("otContainer").classList.add("hidden");
    }
});

function simulasi(customJ1=null, customJ2=null, customOT=null){

    let energy=parseFloat(document.getElementById("energyAwal").value);
    let j1=customJ1 ?? parseInt(jam1.value);
    let j2=customJ2 ?? parseInt(jam2.value);
    let jOT=customOT ?? parseInt(jamOT.value);

    let workCount=0;
    let otUsed=false;
    let lastWork=-10;
    let output="";

    for(let i=1;i<=24;i++){

        let energyAwalJam=energy;

        // decay sederhana
        let decay=energy*((energy/5000)+0.016);
        energy-=decay;

        // WORK NORMAL
        if(i===j1 || i===j2){
            if(workCount<2 && i>=lastWork+4){
                energy*=0.75;
                workCount++;
                lastWork=i;
                output+=`<div class="card">Jam ${i} WORK ✓</div>`;
            }
        }

        // OT
        if(i===jOT){
            if(workCount===2 && !otUsed && energy>=55 && i>=lastWork+4){
                energy*=0.75;
                otUsed=true;
                lastWork=i;
                output+=`<div class="card">Jam ${i} OT ✓</div>`;
            }else{
                output+=`<div class="card">Jam ${i} OT GAGAL</div>`;
            }
        }

        if(energy>100) energy=100;
        if(energy<0) energy=0;

        energy=parseFloat(energy.toFixed(2));
    }

    output+=`<h3>Energy Akhir: ${energy}</h3>`;
    document.getElementById("output").innerHTML=output;

    return energy;
}

function cariOptimal(){

    let bestEnergy=0;
    let bestCombo="";

    for(let j1=1;j1<=24;j1++){
        for(let j2=j1+4;j2<=24;j2++){
            for(let jOT=j2+4;jOT<=24;jOT++){

                let result=simulasi(j1,j2,jOT);
                if(result>bestEnergy){
                    bestEnergy=result;
                    bestCombo=`Kerja1:${j1}, Kerja2:${j2}, OT:${jOT}`;
                }
            }
        }
    }

    document.getElementById("output").innerHTML=
    `<h3>🔥 Kombinasi Optimal</h3>
     <p>${bestCombo}</p>
     <p>Energy Akhir: ${bestEnergy}</p>`;
}

</script>

</body>
</html>
