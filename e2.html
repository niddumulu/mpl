<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Energy MPL</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    padding:20px;
}
.container{
    max-width:800px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
h2{text-align:center;}

input, select, button{
    padding:8px;
    margin:5px 0;
    width:100%;
}

button{
    background:#2c7be5;
    color:white;
    border:none;
    cursor:pointer;
}
button:hover{background:#1a68d1;}

.log{
    margin-top:20px;
    background:#eef3ff;
    padding:15px;
    border-radius:8px;
    max-height:400px;
    overflow:auto;
    font-size:14px;
}

.safe{color:green;font-weight:bold;}
.danger{color:red;font-weight:bold;}
.warning{color:orange;font-weight:bold;}
</style>
</head>
<body>

<div class="container">
<h2>Simulasi Energy 24 Jam</h2>

<label>Energi Awal:</label>
<input type="number" id="startEnergy" value="67">

<label>Jumlah Koran (0 - 10):</label>
<input type="number" id="newspaper" value="8" min="0" max="10">

<button onclick="simulate()">Simulasikan 24 Jam</button>

<div class="log" id="output"></div>
</div>

<script>
function simulate(){

    let energy = parseFloat(document.getElementById("startEnergy").value);
    let koran = parseInt(document.getElementById("newspaper").value);

    const minWork = 35;
    const workCost = 25;
    const regenPerHour = 3; 
    const decayPerHour = 2; 
    const castlePerHour = 40/24;
    const bajuPerHour = 10/24;
    const koranEnergy = koran * 2; 

    let log = "";
    let work1Done = false;
    let work2Done = false;

    log += "<b>Simulasi Dimulai</b><br>";
    log += "Energi Awal: " + energy + "<br><br>";

    for(let hour=0; hour<24; hour++){

        // Regen dasar
        energy += regenPerHour;
        energy += castlePerHour;
        energy += bajuPerHour;

        // Decay
        energy -= decayPerHour;

        // Work 1 jam 08
        if(hour === 8 && !work1Done){
            energy += koranEnergy/2;
            if(energy >= minWork){
                energy -= workCost;
                log += "Jam 08:00 - WORK 1 ✅ (Energi sisa: " + Math.floor(energy) + ")<br>";
                work1Done = true;
            } else {
                log += "<span class='danger'>Jam 08:00 - Gagal Work (Energi kurang)</span><br>";
            }
        }

        // Work 2 jam 20
        if(hour === 20 && !work2Done){
            energy += koranEnergy/2;
            if(energy >= minWork){
                energy -= workCost;
                log += "Jam 20:00 - WORK 2 ✅ (Energi sisa: " + Math.floor(energy) + ")<br>";
                work2Done = true;
            } else {
                log += "<span class='danger'>Jam 20:00 - Gagal Work (Energi kurang)</span><br>";
            }
        }

        if(energy < 35){
            log += "<span class='warning'>Jam "+hour+":00 - Warning: Energi rendah ("+Math.floor(energy)+")</span><br>";
        }

        energy = Math.max(0, energy);
    }

    log += "<br><b>Energi Akhir:</b> " + Math.floor(energy) + "<br>";

    if(work1Done && work2Done){
        log += "<span class='safe'>Kedua Work Berhasil ✅</span>";
    }else{
        log += "<span class='danger'>Tidak stabil ❌ Tambah koran</span>";
    }

    document.getElementById("output").innerHTML = log;
}
</script>

</body>
</html>
