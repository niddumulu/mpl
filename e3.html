<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulator Strategi Work WIB</title>

<style>
body{
    font-family:Arial;
    background:#f4f6f9;
    padding:15px;
}
.container{
    background:white;
    max-width:750px;
    margin:auto;
    padding:20px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
input,select,button{
    width:100%;
    padding:8px;
    margin:5px 0 15px 0;
}
button{
    background:#2d89ef;
    color:white;
    border:none;
    cursor:pointer;
    font-size:16px;
}
button:hover{
    background:#1b5fa7;
}
.card{
    background:#fff;
    padding:15px;
    border-radius:8px;
    margin-top:15px;
    box-shadow:0 2px 6px rgba(0,0,0,0.08);
}
h2{
    text-align:center;
}
</style>
</head>
<body>

<div class="container">
<h2>🔥 Strategi Work Optimal ≥70 (Tampil WIB)</h2>

<label>Energy Awal (0-100)</label>
<input type="number" id="energyAwal" value="100" min="0" max="100">

<label>Pilih Rumah</label>
<select id="house">
<option value="0">Tidak Ada</option>
<option value="0.50">Small House (+0.50/jam)</option>
<option value="0.83">Nice Apartment (+0.83/jam)</option>
<option value="1.46">Mansion (+1.46/jam)</option>
<option value="1.67">Castle (+1.67/jam)</option>
</select>

<label>Jumlah Clothes ⭐ (0.42/jam)</label>
<input type="number" id="star1" value="0" min="0">

<label>Jumlah Clothes ⭐⭐ (1.25/jam)</label>
<input type="number" id="star2" value="0" min="0">

<button onclick="cariOptimal()">🔥 Cari Jam Terbaik</button>

<div id="output"></div>
</div>

<script>

// =====================
// HITUNG BONUS PER JAM
// =====================
function hitungBonus(){
    let house = parseFloat(document.getElementById("house").value);
    let s1 = parseInt(document.getElementById("star1").value) || 0;
    let s2 = parseInt(document.getElementById("star2").value) || 0;

    return house + (s1 * 0.42) + (s2 * 1.25);
}

// =====================
// KONVERSI SERVER ➜ WIB
// WIB = Server + 7 jam 4 menit
// =====================
function serverToWIB(serverHour){

    let totalMinutes = serverHour * 60;

    totalMinutes += (7 * 60) + 4;

    if(totalMinutes >= 1440){
        totalMinutes -= 1440;
    }

    let hour = Math.floor(totalMinutes / 60);
    let minute = totalMinutes % 60;

    hour = hour.toString().padStart(2,"0");
    minute = minute.toString().padStart(2,"0");

    return hour + ":" + minute;
}

// =====================
// SIMULASI ENGINE
// =====================
function simulasi(j1, j2, jOT){

    let energy = parseFloat(document.getElementById("energyAwal").value);
    let totalBonus = hitungBonus();

    let workCount = 0;
    let otUsed = false;
    let lastWork = -10;

    let energyBeforeWork = [];

    for(let i=1; i<=24; i++){

        // DECAY
        let decay = energy * ((energy/5000) + 0.016);
        energy -= decay;

        // BONUS HOUSE + CLOTHES
        energy += totalBonus;

        // RECOVERY KECIL
        if(energy < 10){
            energy += 1;
        }

        // CEK KERJA
        if(i === j1 || i === j2 || i === jOT){

            if(i < lastWork + 4){
                return null; // gagal cooldown
            }

            // SIMPAN ENERGY SEBELUM DROP
            energyBeforeWork.push(energy);

            if(i === jOT){
                if(workCount === 2 && !otUsed && energy >= 70){
                    energy *= 0.75;
                    otUsed = true;
                    lastWork = i;
                } else {
                    return null;
                }
            } else {
                if(workCount < 2 && energy >= 70){
                    energy *= 0.75;
                    workCount++;
                    lastWork = i;
                } else {
                    return null;
                }
            }
        }

        if(energy > 100) energy = 100;
        if(energy < 0) energy = 0;
    }

    if(energyBeforeWork.length === 3){
        return {
            finalEnergy: energy.toFixed(2),
            energies: energyBeforeWork.map(e => e.toFixed(2))
        };
    }

    return null;
}

// =====================
// CARI KOMBINASI TERBAIK
// =====================
function cariOptimal(){

    let best = null;
    let bestEnergy = 0;

    for(let j1=1; j1<=24; j1++){
        for(let j2=j1+4; j2<=24; j2++){
            for(let jOT=j2+4; jOT<=24; jOT++){

                let result = simulasi(j1, j2, jOT);

                if(result){
                    if(parseFloat(result.finalEnergy) > bestEnergy){
                        bestEnergy = parseFloat(result.finalEnergy);
                        best = {j1, j2, jOT, result};
                    }
                }
            }
        }
    }

    let output = document.getElementById("output");

    if(best){
        output.innerHTML = `
        <div class="card">
        <h3>🔥 Kombinasi Optimal</h3>

        <p>Kerja 1 : ${serverToWIB(best.j1)} WIB 
        (Server ${best.j1}) - Energy ${best.result.energies[0]}</p>

        <p>Kerja 2 : ${serverToWIB(best.j2)} WIB 
        (Server ${best.j2}) - Energy ${best.result.energies[1]}</p>

        <p>OT : ${serverToWIB(best.jOT)} WIB 
        (Server ${best.jOT}) - Energy ${best.result.energies[2]}</p>

        <hr>
        <strong>Energy Akhir Hari: ${best.result.finalEnergy}</strong>
        </div>
        `;
    } else {
        output.innerHTML = `
        <div class="card">
        ⚠ Tidak ada kombinasi kerja 3x dengan energy ≥ 70.
        <br><br>
        💡 Saran:
        <ul>
        <li>Tambah Clothes ⭐⭐</li>
        <li>Upgrade Rumah</li>
        <li>Naikkan Energy Awal</li>
        </ul>
        </div>
        `;
    }
}

</script>

</body>
</html>
