<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulasi Energy 24 Jam</title>

<style>
body {
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    padding:10px;
}

.container {
    background:white;
    padding:15px;
    border-radius:10px;
    max-width:600px;
    margin:auto;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2 {
    text-align:center;
    font-size:20px;
}

label {
    font-weight:bold;
}

input, select {
    padding:8px;
    margin:5px 0 15px 0;
    width:100%;
    border-radius:6px;
    border:1px solid #ccc;
}

button {
    padding:10px;
    width:100%;
    background:#2d89ef;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

button:hover {
    background:#1b5fa7;
}

.card {
    background:#ffffff;
    border-radius:10px;
    padding:12px;
    margin-top:10px;
    box-shadow:0 2px 6px rgba(0,0,0,0.08);
    font-size:14px;
}

.card-title {
    font-weight:bold;
    margin-bottom:8px;
    color:#2d89ef;
}

.row {
    display:flex;
    justify-content:space-between;
    margin:3px 0;
}

.result {
    margin-top:20px;
    font-size:16px;
    font-weight:bold;
    text-align:center;
}

.summary {
    margin-top:10px;
    font-size:14px;
    text-align:center;
}
</style>
</head>
<body>

<div class="container">
<h2>⚡ Simulasi Energy 24 Jam</h2>

<label>Energy Awal (0 - 100):</label>
<input type="number" id="energyAwal" value="100" min="0" max="100">

<label>Pilih House:</label>
<select id="house">
    <option value="0">Tidak Ada</option>
    <option value="0.50">Small House (+0.50/jam)</option>
    <option value="0.83">Nice Apartment (+0.83/jam)</option>
    <option value="1.46">Mansion (+1.46/jam)</option>
    <option value="1.67">Castle (+1.67/jam)</option>
</select>

<label>Jumlah Clothes ⭐ (0.42/jam per item):</label>
<input type="number" id="star1" value="0" min="0">

<label>Jumlah Clothes ⭐⭐ (1.25/jam per item):</label>
<input type="number" id="star2" value="0" min="0">

<button onclick="simulasi()">Simulasi 24 Jam</button>

<div id="output"></div>
</div>

<script>
function simulasi() {

    let energy = parseFloat(document.getElementById("energyAwal").value);
    if (energy > 100) energy = 100;
    if (energy < 0) energy = 0;

    let houseBonus = parseFloat(document.getElementById("house").value);
    let star1 = parseInt(document.getElementById("star1").value) || 0;
    let star2 = parseInt(document.getElementById("star2").value) || 0;

    let clothesBonus = (star1 * 0.42) + (star2 * 1.25);
    let totalBonus = houseBonus + clothesBonus;

    let output = "";

    for(let i=1; i<=24; i++) {

        let energyAwalJam = energy;

        let decay = energy * ((energy / 5000) + 0.016);
        energy = energy - decay;

        energy = energy + totalBonus;

        if (energy < 10) {
            energy += 1;
        }

        if (energy > 100) energy = 100;
        if (energy < 0) energy = 0;

        energy = parseFloat(energy.toFixed(2));
        decay = parseFloat(decay.toFixed(2));

        output += `
        <div class="card">
            <div class="card-title">Jam ${i}</div>
            <div class="row"><span>Energy Awal</span><span>${energyAwalJam.toFixed(2)}</span></div>
            <div class="row"><span>Decay</span><span>- ${decay}</span></div>
            <div class="row"><span>Total Bonus</span><span>+ ${totalBonus.toFixed(2)}</span></div>
            <div class="row"><span><strong>Energy Akhir</strong></span><span><strong>${energy}</strong></span></div>
        </div>
        `;
    }

    output += `
    <div class="summary">
        Bonus per Jam: ${totalBonus.toFixed(2)}
    </div>
    <div class="result">
        ⚡ Energy Akhir Setelah 24 Jam: ${energy.toFixed(2)}
    </div>
    `;

    document.getElementById("output").innerHTML = output;
}
</script>

</body>
</html>
